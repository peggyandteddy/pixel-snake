  <style>

<body>
  <header class="topbar">
    <div class="title">PIXEL · SNAKE</div>
    <div class="stats">
      <div class="stat"><span class="label">SCORE</span><span class="value" id="score">0</span></div>
      <div class="stat"><span class="label">BEST</span><span class="value" id="best">0</span></div>
    </div>
  </header>

  <main class="stage">
    <div class="frame" id="frame">
      <canvas id="game" width="480" height="480" class="pixel"></canvas>
      <div class="overlay" id="overlay">
        <h2 id="overlay-title">PIXEL SNAKE</h2>
        <p id="overlay-text">滑动屏幕 / 点方向键<br>吃黄色像素，别撞自己</p>
        <button class="btn" id="primary-btn">▶ 开 始</button>
      </div>
    </div>
  </main>

  <section class="controls">
    <div class="dpad" id="dpad" aria-label="方向键">
      <button class="up"    data-dir="up"    aria-label="上">▲</button>
      <button class="left"  data-dir="left"  aria-label="左">◀</button>
      <button class="right" data-dir="right" aria-label="右">▶</button>
      <button class="down"  data-dir="down"  aria-label="下">▼</button>
    </div>
    <div class="actions">
      <div class="speed" role="group" aria-label="速度档位">
        <button class="chip" data-speed="180">慢</button>
        <button class="chip active" data-speed="110">中</button>
        <button class="chip" data-speed="70">快</button>
        <button class="chip" data-speed="45">极速</button>
      </div>
      <div class="speed-row">
        <span class="label">SPEED</span>
        <input id="speed-range" class="pixel-range" type="range" min="40" max="220" step="5" value="110" />
        <span class="value" id="speed-value">110ms</span>
      </div>
      <div class="audio-row">
        <button class="icon-btn on" id="music-btn" aria-pressed="true">♪ 音乐 ON</button>
        <button class="icon-btn on" id="sfx-btn" aria-pressed="true">♫ 音效 ON</button>
      </div>
      <button class="btn ghost" id="pause-btn">⏸ 暂 停</button>
      <button class="btn warn" id="restart-btn">↻ 重 开</button>
      <div class="hint">滑动 / 方向键 / WASD<br>空格 暂停 · 拖动滑杆调速</div>
    </div>
  </section>

  <script>
  (function(){
    // ============== 配置 ==============
    const COLS = 20, ROWS = 20;          // 网格数
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;

    function resizeCanvas(){
      // 物理像素跟随显示尺寸，保持像素清晰
      const rect = canvas.getBoundingClientRect();
      const dpr = Math.max(1, Math.min(2, window.devicePixelRatio||1));
      const size = Math.floor(Math.min(rect.width, rect.height));
      canvas.width  = size * dpr;
      canvas.height = size * dpr;
      ctx.setTransform(dpr,0,0,dpr,0,0);
      ctx.imageSmoothingEnabled = false;
    }
    window.addEventListener('resize', resizeCanvas);

    // ============== 游戏状态 ==============
    const STATE = { READY:'ready', PLAYING:'playing', PAUSED:'paused', OVER:'over' };
    let state = STATE.READY;
    let snake, dir, nextDir, food, score, best, tickMs, timer;

    const overlay = document.getElementById('overlay');
    const overlayTitle = document.getElementById('overlay-title');
    const overlayText  = document.getElementById('overlay-text');
    const primaryBtn   = document.getElementById('primary-btn');
    const pauseBtn     = document.getElementById('pause-btn');
    const restartBtn   = document.getElementById('restart-btn');
    const scoreEl      = document.getElementById('score');
    const bestEl       = document.getElementById('best');

    function loadBest(){
      const v = parseInt(localStorage.getItem('pixel-snake-best')||'0',10);
      best = isNaN(v)?0:v; bestEl.textContent = best;
    }
    function saveBest(){
      if(score>best){ best=score; localStorage.setItem('pixel-snake-best', String(best)); bestEl.textContent=best; }
    }

    function reset(){
      snake = [{x:9,y:10},{x:8,y:10},{x:7,y:10}];
      dir = {x:1,y:0}; nextDir = dir;
      score = 0; scoreEl.textContent = score;
      placeFood();
      draw();
    }
    function placeFood(){
      while(true){
        const f = {x:Math.floor(Math.random()*COLS), y:Math.floor(Math.random()*ROWS)};
        if(!snake.some(s=>s.x===f.x && s.y===f.y)){ food=f; return; }
      }
    }

    // ============== 渲染 ==============
    function draw(){
      const W = canvas.clientWidth, H = canvas.clientHeight;
      const cell = W / COLS;

      // 棋盘格背景
      for(let y=0;y<ROWS;y++){
        for(let x=0;x<COLS;x++){
          ctx.fillStyle = ((x+y)%2===0) ? '#161c34' : '#1a2140';
          ctx.fillRect(x*cell,y*cell,cell,cell);
        }
      }
      // 食物（带描边像素感）
      drawPixel(food.x, food.y, cell, '#FFD400', '#a07c00');

      // 蛇
      snake.forEach((s,i)=>{
        const isHead = i===0;
        drawPixel(s.x, s.y, cell, isHead?'#A6FF55':'#7CFC00', '#246b00');
        if(isHead){
          // 蛇头眼睛
          ctx.fillStyle = '#0c0f1d';
          const ex = s.x*cell, ey = s.y*cell;
          const eye = Math.max(2, cell*0.14);
          let e1, e2;
          if(dir.x===1){ e1=[ex+cell*0.7, ey+cell*0.25]; e2=[ex+cell*0.7, ey+cell*0.6]; }
          else if(dir.x===-1){ e1=[ex+cell*0.2, ey+cell*0.25]; e2=[ex+cell*0.2, ey+cell*0.6]; }
          else if(dir.y===-1){ e1=[ex+cell*0.25, ey+cell*0.2]; e2=[ex+cell*0.6, ey+cell*0.2]; }
          else { e1=[ex+cell*0.25, ey+cell*0.7]; e2=[ex+cell*0.6, ey+cell*0.7]; }
          ctx.fillRect(e1[0],e1[1],eye,eye);
          ctx.fillRect(e2[0],e2[1],eye,eye);
        }
      });
    }
    function drawPixel(gx,gy,cell,color,shadow){
      const x = gx*cell, y = gy*cell;
      ctx.fillStyle = shadow;
      ctx.fillRect(x+1,y+1,cell-2,cell-2);
      ctx.fillStyle = color;
      ctx.fillRect(x+2,y+2,cell-5,cell-5);
      // 高光像素
      ctx.fillStyle = 'rgba(255,255,255,.25)';
      ctx.fillRect(x+3,y+3,Math.max(2,cell*0.18),Math.max(2,cell*0.18));
    }

    // ============== 主循环 ==============
    function step(){
      dir = nextDir;
      const head = {x:snake[0].x+dir.x, y:snake[0].y+dir.y};
      // 撞墙
      if(head.x<0||head.y<0||head.x>=COLS||head.y>=ROWS){ return gameOver(); }
      // 撞自己
      if(snake.some((s,i)=> i<snake.length-1 && s.x===head.x && s.y===head.y)){ return gameOver(); }
      snake.unshift(head);
      if(head.x===food.x && head.y===food.y){
        score += 10; scoreEl.textContent = score;
        placeFood();
      } else {
        snake.pop();
      }
      draw();
    }
    function loop(){
      if(state!==STATE.PLAYING) return;
      step();
      timer = setTimeout(loop, tickMs);
    }
    function start(){
      if(state===STATE.PLAYING) return;
      reset();
      state = STATE.PLAYING;
      overlay.classList.add('hidden');
      pauseBtn.textContent = '⏸ 暂 停';
      clearTimeout(timer);
      loop();
    }
    function pause(){
      if(state!==STATE.PLAYING) return;
      state = STATE.PAUSED;
      clearTimeout(timer);
      overlayTitle.textContent = 'PAUSED';
      overlayText.innerHTML = '点击继续 / 按空格';
      primaryBtn.textContent = '▶ 继 续';
      overlay.classList.remove('hidden');
      pauseBtn.textContent = '▶ 继 续';
    }
    function resume(){
      if(state!==STATE.PAUSED) return;
      state = STATE.PLAYING;
      overlay.classList.add('hidden');
      pauseBtn.textContent = '⏸ 暂 停';
      loop();
    }
    function gameOver(){
      state = STATE.OVER;
      clearTimeout(timer);
      saveBest();
      overlayTitle.textContent = 'GAME OVER';
      overlayText.innerHTML = '本局得分 <b style="color:#FFD400">'+score+'</b><br>最高纪录 '+best;
      primaryBtn.textContent = '↻ 再 来 一 局';
      overlay.classList.remove('hidden');
    }

    // ============== 输入 ==============
    function setDir(nx,ny){
      // 不能反向
      if(snake.length>1 && (nx===-dir.x && ny===-dir.y)) return;
      nextDir = {x:nx,y:ny};
    }
    const dirMap = {up:[0,-1],down:[0,1],left:[-1,0],right:[1,0]};
    document.getElementById('dpad').addEventListener('click',(e)=>{
      const t = e.target.closest('button[data-dir]');
      if(!t) return;
      const d = dirMap[t.dataset.dir]; setDir(d[0],d[1]);
    });
    // 触屏长按方向（点按即响应）
    document.querySelectorAll('#dpad button').forEach(b=>{
      b.addEventListener('touchstart',(e)=>{
        e.preventDefault();
        const d = dirMap[b.dataset.dir]; setDir(d[0],d[1]);
        if(state===STATE.READY) start();
      },{passive:false});
    });

    // 键盘
    window.addEventListener('keydown',(e)=>{
      const k = e.key.toLowerCase();
      if(['arrowup','w'].includes(k)) setDir(0,-1);
      else if(['arrowdown','s'].includes(k)) setDir(0,1);
      else if(['arrowleft','a'].includes(k)) setDir(-1,0);
      else if(['arrowright','d'].includes(k)) setDir(1,0);
      else if(k===' '){
        e.preventDefault();
        if(state===STATE.PLAYING) pause();
        else if(state===STATE.PAUSED) resume();
        else start();
      }
    });

    // 滑动手势（在画布范围内）
    let touchStart=null;
    const frame = document.getElementById('frame');
    frame.addEventListener('touchstart',(e)=>{
      const t = e.touches[0]; touchStart={x:t.clientX,y:t.clientY,t:Date.now()};
    },{passive:true});
    frame.addEventListener('touchend',(e)=>{
      if(!touchStart) return;
      const t = e.changedTouches[0];
      const dx = t.clientX - touchStart.x;
      const dy = t.clientY - touchStart.y;
      const adx=Math.abs(dx), ady=Math.abs(dy);
      // 轻点开始/暂停切换
      if(adx<8 && ady<8 && (Date.now()-touchStart.t)<260){
        if(state===STATE.READY||state===STATE.OVER) start();
        else if(state===STATE.PLAYING) pause();
        else if(state===STATE.PAUSED) resume();
      } else if(Math.max(adx,ady)>20){
        if(adx>ady) setDir(dx>0?1:-1,0);
        else setDir(0,dy>0?1:-1);
        if(state===STATE.READY||state===STATE.OVER) start();
      }
      touchStart=null;
    },{passive:true});

    // 顶部按钮
    primaryBtn.addEventListener('click',()=>{
      if(state===STATE.PAUSED) resume(); else start();
    });
    pauseBtn.addEventListener('click',()=>{
      if(state===STATE.PLAYING) pause();
      else if(state===STATE.PAUSED) resume();
      else start();
    });
    restartBtn.addEventListener('click',()=>{ start(); });

    // 速度滑杆（连续调速） + 档位切换
    const speedRange = document.getElementById('speed-range');
    const speedValue = document.getElementById('speed-value');
    function applySpeed(ms, fromChip){
      tickMs = ms;
      speedRange.value = String(ms);
      speedValue.textContent = ms + 'ms';
      // 同步档位高亮：找到最接近的 chip
      document.querySelectorAll('.chip').forEach(x=>{
        x.classList.toggle('active', parseInt(x.dataset.speed,10)===ms);
      });
      // 同步背景音乐节拍
      if(audio.musicOn) audio.scheduleMusic();
    }
    document.querySelectorAll('.chip').forEach(c=>{
      c.addEventListener('click',()=>{
        applySpeed(parseInt(c.dataset.speed,10), true);
      });
    });
    speedRange.addEventListener('input',()=>{
      applySpeed(parseInt(speedRange.value,10));
    });

    // ============== 音乐 / 音效（Web Audio 8-bit） ==============
    const audio = (function(){
      let ctx=null, master=null, musicGain=null, sfxGain=null;
      let musicOn=true, sfxOn=true, musicTimer=null, melodyIdx=0;
      // 简单的 8-bit 旋律（C 大调，循环）
      const melody = [
        ['E5',1],['E5',1],['_',1],['E5',1],['_',1],['C5',1],['E5',1],['G5',2],['_',2],
        ['G4',2],['_',2],
        ['C5',2],['_',1],['G4',1],['_',2],['E4',2],
        ['_',1],['A4',1],['B4',1],['Bb4',1],['A4',2],
        ['G4',1],['E5',1],['G5',1],['A5',2],['F5',1],['G5',1],
        ['_',1],['E5',1],['C5',1],['D5',1],['B4',2],['_',2]
      ];
      const noteFreq = (function(){
        const names=['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
        const map={};
        for(let oct=2; oct<=6; oct++){
          for(let i=0;i<names.length;i++){
            map[names[i]+oct]=440*Math.pow(2,((oct-4)*12+i-9)/12);
          }
        }
        map['Bb4']=map['A#4']; map['Eb5']=map['D#5'];
        return map;
      })();
      function ensure(){
        if(ctx) return;
        const AC = window.AudioContext||window.webkitAudioContext;
        if(!AC) return;
        ctx = new AC();
        master = ctx.createGain(); master.gain.value=0.6; master.connect(ctx.destination);
        musicGain = ctx.createGain(); musicGain.gain.value=0.18; musicGain.connect(master);
        sfxGain   = ctx.createGain(); sfxGain.gain.value=0.45;   sfxGain.connect(master);
      }
      function blip(freq, dur, type='square', gainNode=sfxGain, attack=0.005, vol=1){
        if(!ctx||!gainNode) return;
        const t = ctx.currentTime;
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type=type; osc.frequency.value=freq;
        g.gain.setValueAtTime(0,t);
        g.gain.linearRampToValueAtTime(0.6*vol, t+attack);
        g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
        osc.connect(g); g.connect(gainNode);
        osc.start(t); osc.stop(t+dur+0.02);
      }
      function eat(){ if(!sfxOn) return; ensure(); blip(880,0.08,'square'); setTimeout(()=>blip(1320,0.10,'square'),60); }
      function over(){
        if(!sfxOn) return; ensure();
        blip(440,0.12,'sawtooth'); setTimeout(()=>blip(330,0.14,'sawtooth'),120);
        setTimeout(()=>blip(220,0.20,'sawtooth'),260);
      }
      function turn(){ if(!sfxOn) return; ensure(); blip(660,0.04,'square',sfxGain,0.002,0.5); }
      function playNote(name, beats){
        const noteMs = Math.max(120, Math.min(280, tickMs*1.6)); // 节拍跟随游戏速度
        const dur = (noteMs*beats)/1000;
        if(name==='_'){ return dur; }
        const f = noteFreq[name];
        if(!f) return dur;
        const t = ctx.currentTime;
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type='square'; osc.frequency.value=f;
        g.gain.setValueAtTime(0,t);
        g.gain.linearRampToValueAtTime(0.35, t+0.01);
        g.gain.linearRampToValueAtTime(0.18, t+dur*0.5);
        g.gain.exponentialRampToValueAtTime(0.0001, t+dur*0.95);
        osc.connect(g); g.connect(musicGain);
        osc.start(t); osc.stop(t+dur);
        return dur;
      }
      function tickMusic(){
        if(!musicOn||!ctx) return;
        const [n,b] = melody[melodyIdx % melody.length];
        const dur = playNote(n,b);
        melodyIdx++;
        musicTimer = setTimeout(tickMusic, dur*1000);
      }
      function scheduleMusic(){
        if(musicTimer){ clearTimeout(musicTimer); musicTimer=null; }
        if(musicOn) tickMusic();
      }
      function startMusic(){
        ensure();
        if(!ctx) return;
        if(ctx.state==='suspended') ctx.resume();
        scheduleMusic();
      }
      function stopMusic(){ if(musicTimer){ clearTimeout(musicTimer); musicTimer=null; } }
      return {
        get musicOn(){return musicOn;}, get sfxOn(){return sfxOn;},
        toggleMusic(){
          musicOn=!musicOn;
          if(musicOn) startMusic(); else stopMusic();
          return musicOn;
        },
        toggleSfx(){ sfxOn=!sfxOn; return sfxOn; },
        eat, over, turn,
        startMusic, stopMusic, scheduleMusic,
        kick(){ ensure(); if(ctx&&ctx.state==='suspended') ctx.resume(); }
      };
    })();
    // 绑定音乐/音效按钮
    const musicBtn = document.getElementById('music-btn');
    const sfxBtn   = document.getElementById('sfx-btn');
    musicBtn.addEventListener('click',()=>{
      const on = audio.toggleMusic();
      musicBtn.classList.toggle('on', on);
      musicBtn.textContent = on ? '♪ 音乐 ON' : '♪ 音乐 OFF';
    });
    sfxBtn.addEventListener('click',()=>{
      const on = audio.toggleSfx();
      sfxBtn.classList.toggle('on', on);
      sfxBtn.textContent = on ? '♫ 音效 ON' : '♫ 音效 OFF';
    });

    // 在 setDir 后增加转向音；在 step 中接入吃食物 / 失败音
    const _origSetDir = setDir;
    setDir = function(nx,ny){
      const before = nextDir;
      _origSetDir(nx,ny);
      if(state===STATE.PLAYING && (before.x!==nextDir.x||before.y!==nextDir.y)) audio.turn();
    };

    // 包装 start / pause / resume / gameOver / step 以联动音乐
    const _origStart = start, _origPause = pause, _origResume = resume, _origOver = gameOver, _origStep = step;
    start = function(){
      audio.kick();
      _origStart();
      if(audio.musicOn) audio.startMusic();
    };
    pause = function(){ _origPause(); audio.stopMusic(); };
    resume = function(){ _origResume(); if(audio.musicOn) audio.startMusic(); };
    gameOver = function(){ _origOver(); audio.stopMusic(); audio.over(); };
    step = function(){
      const beforeLen = snake.length;
      _origStep();
      if(snake.length>beforeLen) audio.eat();
    };
    // 重新绑定主按钮使用新的包装函数
    primaryBtn.onclick = ()=>{ if(state===STATE.PAUSED) resume(); else start(); };
    pauseBtn.onclick   = ()=>{ if(state===STATE.PLAYING) pause(); else if(state===STATE.PAUSED) resume(); else start(); };
    restartBtn.onclick = ()=>{ start(); };

    // ============== 初始化 ==============
    tickMs = 110;
    applySpeed(110);
    loadBest();
    resizeCanvas();
    reset();
  })();
  </script>
